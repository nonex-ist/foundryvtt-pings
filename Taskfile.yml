version: "3"

dotenv: [".env"]

vars:
  # Foundry image tag. Defaults to the floating `14` major; pin to a
  # specific build (e.g. `14.361`) via .env when you want reproducible
  # runs against the module.json `compatibility.verified` value.
  FOUNDRY_VERSION: '{{.FOUNDRY_VERSION | default "14"}}'
  CONTAINER_NAME: pings-foundry
  # Host port for the Foundry container. Override per-machine via .env
  # (FOUNDRY_PORT=30030) when 30000 is squatted by another process.
  FOUNDRY_PORT: '{{.FOUNDRY_PORT | default "30000"}}'
  FOUNDRY_DATA: "{{.ROOT_DIR}}/.foundry-data"
  # Containerd namespace for nerdctl. Rancher Desktop ships with `default`
  # for plain containers and `k8s.io` for the k8s integration; pin it
  # explicitly so commands aren't sensitive to ambient state. Override via
  # .env (NERDCTL_NAMESPACE=k8s.io) if your container lives elsewhere.
  NERDCTL_NAMESPACE: '{{.NERDCTL_NAMESPACE | default "default"}}'
  # Resolve the container runtime once. Prefer docker; fall back to
  # `nerdctl --namespace=<ns>` so every downstream invocation targets the
  # same namespace without each task remembering to pass the flag.
  CONTAINER_RT:
    sh: |
      if docker info >/dev/null 2>&1; then echo docker
      elif nerdctl info >/dev/null 2>&1; then echo "nerdctl --namespace={{.NERDCTL_NAMESPACE}}"
      else echo none
      fi

tasks:
  default:
    desc: List available tasks
    cmds:
      - task --list

  # ── Prerequisites ────────────────────────────────────────────────

  check:prereqs:
    desc: Verify required development tools are installed
    silent: true
    cmds:
      - |
        MISSING=0
        check() {
          if command -v "$1" >/dev/null 2>&1; then
            echo "✓ $1 $(eval "$2")"
          else
            echo "✗ $1 is not installed ($3)"
            MISSING=1
          fi
        }
        check node   "node --version"              "brew install node"
        check pnpm   "pnpm --version"              "brew install pnpm"
        check op     "op --version"                 "brew install 1password-cli"

        # Container runtime: docker or nerdctl
        if docker info >/dev/null 2>&1; then
          echo "✓ docker (daemon running)"
        elif nerdctl info >/dev/null 2>&1; then
          echo "✓ nerdctl (containerd running)"
        elif command -v docker >/dev/null 2>&1 || command -v nerdctl >/dev/null 2>&1; then
          echo "⚠ docker/nerdctl installed but daemon not running"
        else
          echo "✗ docker or nerdctl not installed (install Docker Desktop or Rancher Desktop)"
          MISSING=1
        fi

        [ "$MISSING" -ne 0 ] && echo "" && echo "Install missing tools and re-run." && exit 1
        echo "" && echo "All prerequisites satisfied."

  # ── Setup ────────────────────────────────────────────────────────

  setup:
    desc: Bootstrap project from a fresh clone
    cmds:
      - task: check:prereqs
      - task: setup:secrets
      - task: setup:deps
      - task: build
      - echo ""
      - echo "Setup complete. Run 'task foundry:start' to launch a test instance."

  setup:deps:
    desc: Install Node dependencies
    silent: true
    cmds:
      - echo "Installing dependencies..."
      - pnpm install
      - echo "✓ Dependencies installed"

  setup:secrets:
    desc: Materialize 1Password secrets into .env
    silent: true
    cmds:
      - |
        if [ ! -f .env.1password ]; then
          echo "⏭ .env.1password not found, skipping (see .env.example)"
          exit 0
        fi
        if [ -f .env ]; then
          echo "⏭ .env already exists, skipping (delete to re-materialize)"
          exit 0
        fi
        if ! op account list >/dev/null 2>&1; then
          echo "✗ Not signed in to 1Password CLI. Run: eval \$(op signin)"
          exit 1
        fi
        TMPENV=$(mktemp)
        trap 'rm -f "$TMPENV"' EXIT
        while IFS= read -r line || [ -n "$line" ]; do
          case "$line" in ""|\#*) continue ;; esac
          KEY="${line%%=*}"; VALUE="${line#*=}"; VALUE="${VALUE%\"}"; VALUE="${VALUE#\"}"
          case "$VALUE" in
            op://*) RESOLVED=$(op read "$VALUE" 2>/dev/null) || { echo "✗ Failed to resolve $KEY"; exit 1; }
                    echo "${KEY}=${RESOLVED}" >> "$TMPENV"; echo "✓ $KEY (1password)" ;;
            *)      echo "${KEY}=${VALUE}" >> "$TMPENV"; echo "✓ $KEY (literal)" ;;
          esac
        done < .env.1password
        mv "$TMPENV" .env; trap - EXIT
        echo "Secrets materialized to .env"

  # ── Build ────────────────────────────────────────────────────────

  build:
    desc: Bundle the module entrypoint via esbuild
    cmds:
      - pnpm run build

  watch:
    desc: Watch the entrypoint for changes and rebuild
    cmds:
      - pnpm run watch

  clean:
    desc: Remove build artifacts
    cmds:
      - pnpm run clean

  # ── Lint, Typecheck, Test ────────────────────────────────────────

  lint:
    desc: Run ESLint
    cmds:
      - pnpm run lint

  typecheck:
    desc: Run TypeScript type checking
    cmds:
      - pnpm run typecheck

  test:
    desc: Run unit tests (vitest)
    cmds:
      - pnpm run test

  check:
    desc: Lint + typecheck + tests (CI gate)
    cmds:
      - pnpm run check

  # ── Foundry VTT Test Instance ───────────────────────────────────

  foundry:init-config:
    internal: true
    cmds:
      - mkdir -p "{{.FOUNDRY_DATA}}/Config"
      - |
        node -e "
          const fs = require('fs');
          const p = '{{.FOUNDRY_DATA}}/Config/options.json';
          const existing = fs.existsSync(p) ? JSON.parse(fs.readFileSync(p, 'utf8')) : {};
          fs.writeFileSync(p, JSON.stringify({ ...existing, telemetry: false }, null, 2) + '\n');
        "

  foundry:start:
    desc: Start a Foundry VTT v14 container for testing
    deps: [build, foundry:init-config]
    preconditions:
      - sh: test -f .env
        msg: ".env not found. Run 'task setup:secrets' or copy .env.example to .env"
      - sh: '[ "{{.CONTAINER_RT}}" != "none" ]'
        msg: "No container runtime available. Start Docker Desktop or Rancher Desktop."
    cmds:
      - mkdir -p "{{.FOUNDRY_DATA}}/Data/modules"
      - |
        if {{.CONTAINER_RT}} ps -a --format '{{"{{.Names}}"}}' 2>/dev/null | grep -q '^{{.CONTAINER_NAME}}$'; then
          echo "Container {{.CONTAINER_NAME}} already exists. Run 'task foundry:stop' first."
          exit 1
        fi
      - >-
        {{.CONTAINER_RT}} run -d
        --name {{.CONTAINER_NAME}}
        --hostname {{.CONTAINER_NAME}}
        --env FOUNDRY_USERNAME="${FOUNDRY_USERNAME}"
        --env FOUNDRY_PASSWORD="${FOUNDRY_PASSWORD}"
        --env FOUNDRY_LICENSE_KEY="${FOUNDRY_LICENSE_KEY}"
        --env FOUNDRY_ADMIN_KEY="${FOUNDRY_ADMIN_KEY}"
        --env FOUNDRY_TELEMETRY=false
        --publish {{.FOUNDRY_PORT}}:30000/tcp
        --volume "{{.FOUNDRY_DATA}}:/data"
        --volume "{{.ROOT_DIR}}/src:/data/Data/modules/pings"
        ghcr.io/felddy/foundryvtt:{{.FOUNDRY_VERSION}}
      - echo ""
      - echo "Foundry VTT starting at http://localhost:{{.FOUNDRY_PORT}}"
      - echo "Container {{.CONTAINER_NAME}} (via {{.CONTAINER_RT}})"
      - echo "It takes ~30s for Foundry to download and start."
      - echo "Run 'task foundry:logs' to follow startup progress."

  foundry:stop:
    desc: Stop and remove the Foundry test container
    cmds:
      - '{{.CONTAINER_RT}} rm -f {{.CONTAINER_NAME}} 2>/dev/null || true'
      - echo "✓ Container removed"

  foundry:logs:
    desc: Follow Foundry container logs
    cmds:
      - '{{.CONTAINER_RT}} logs -f {{.CONTAINER_NAME}}'

  foundry:status:
    desc: Check Foundry container status
    silent: true
    cmds:
      - |
        if {{.CONTAINER_RT}} ps --format '{{"{{.Names}}"}}' 2>/dev/null | grep -q '^{{.CONTAINER_NAME}}$'; then
          echo "✓ {{.CONTAINER_NAME}} is running (via {{.CONTAINER_RT}})"
          echo "  URL: http://localhost:{{.FOUNDRY_PORT}}"
        else
          echo "✗ {{.CONTAINER_NAME}} is not running"
        fi

  foundry:restart:
    desc: Rebuild and restart the Foundry test container
    cmds:
      - task: foundry:stop
      - task: foundry:start

  foundry:shell:
    desc: Open a shell in the Foundry container
    cmds:
      - '{{.CONTAINER_RT}} exec -it {{.CONTAINER_NAME}} /bin/sh'

  foundry:reset-passwords:
    desc: Reset all user passwords in a world (access via admin UI)
    silent: true
    cmds:
      - |
        echo "Open http://localhost:{{.FOUNDRY_PORT}}/setup"
        echo "Click the world's context menu (⋮) → Reset User Passwords"
        echo "This clears all passwords so you can log in without one."

  foundry:clean:
    desc: Stop container and remove all Foundry test data (will require re-activation of license)
    prompt: This will delete all Foundry data including the signed license. Continue?
    cmds:
      - task: foundry:stop
      - rm -rf "{{.FOUNDRY_DATA}}"
      - echo "✓ Foundry data removed (license will need re-activation)"

  foundry:source:
    desc: Extract Foundry runtime source (foundry.mjs, vendor.mjs, en.json) from the running container into .foundry-src/
    silent: true
    preconditions:
      - sh: '{{.CONTAINER_RT}} ps --format ''{{"{{.Names}}"}}'' 2>/dev/null | grep -q ''^{{.CONTAINER_NAME}}$'''
        msg: "Foundry container is not running. Run 'task foundry:start' first."
    cmds:
      - mkdir -p .foundry-src
      - '{{.CONTAINER_RT}} cp {{.CONTAINER_NAME}}:/home/node/resources/app/public/scripts/foundry.mjs .foundry-src/foundry.mjs'
      - '{{.CONTAINER_RT}} cp {{.CONTAINER_NAME}}:/home/node/resources/app/public/scripts/vendor.mjs .foundry-src/vendor.mjs'
      - '{{.CONTAINER_RT}} cp {{.CONTAINER_NAME}}:/home/node/resources/app/public/lang/en.json .foundry-src/en.json'
      - |
        echo "✓ Foundry source extracted to .foundry-src/"
        echo "  foundry.mjs $(wc -l < .foundry-src/foundry.mjs) lines"
        echo "  vendor.mjs  $(wc -l < .foundry-src/vendor.mjs) lines"
        echo "  en.json     $(wc -l < .foundry-src/en.json) lines"
        echo ""
        echo "Tip: when a stack trace shows 'foundry.mjs:<line>', open .foundry-src/foundry.mjs at that line."

  # ── Release ──────────────────────────────────────────────────────

  release:patch:
    desc: Tag a patch release (v0.1.0 → v0.1.1)
    cmds:
      - task: release
        vars:
          BUMP: patch

  release:minor:
    desc: Tag a minor release (v0.1.0 → v0.2.0)
    cmds:
      - task: release
        vars:
          BUMP: minor

  release:major:
    desc: Tag a major release (v0.1.0 → v1.0.0)
    cmds:
      - task: release
        vars:
          BUMP: major

  release:
    internal: true
    vars:
      LATEST_TAG:
        sh: git describe --tags --match 'v[0-9]*' --abbrev=0 2>/dev/null || echo "v0.0.0"
      MAJOR:
        sh: echo "{{.LATEST_TAG}}" | sed 's/^v//' | cut -d. -f1
      MINOR:
        sh: echo "{{.LATEST_TAG}}" | sed 's/^v//' | cut -d. -f2
      PATCH:
        sh: echo "{{.LATEST_TAG}}" | sed 's/^v//' | cut -d. -f3
      NEXT_TAG:
        sh: |
          case "{{.BUMP}}" in
            major) echo "v$(({{.MAJOR}}+1)).0.0" ;;
            minor) echo "v{{.MAJOR}}.$(({{.MINOR}}+1)).0" ;;
            patch) echo "v{{.MAJOR}}.{{.MINOR}}.$(({{.PATCH}}+1))" ;;
          esac
      NEXT_VERSION:
        sh: echo "{{.NEXT_TAG}}" | sed 's/^v//'
    preconditions:
      - sh: test "$(git branch --show-current)" = "main"
        msg: "Must be on main branch to release"
      - sh: test -z "$(git status --porcelain)"
        msg: "Working directory must be clean"
      - sh: git diff --quiet HEAD origin/main
        msg: "Local main must be up to date with origin"
      - sh: "grep -q '\"version\": \"{{.NEXT_VERSION}}\"' src/module.json"
        msg: 'src/module.json version must be "{{.NEXT_VERSION}}" before tagging'
      - sh: "grep -q '\"version\": \"{{.NEXT_VERSION}}\"' package.json"
        msg: 'package.json version must be "{{.NEXT_VERSION}}" before tagging'
    cmds:
      - echo "{{.LATEST_TAG}} → {{.NEXT_TAG}}"
      - git tag "{{.NEXT_TAG}}"
      - git push origin "{{.NEXT_TAG}}"
      - echo "Tagged and pushed {{.NEXT_TAG}}"
